<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com">
  <title>Gacha Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 18px;
      padding: 28px;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: #7c6af7;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .message {
      font-size: 13px;
      color: #8888a8;
      text-align: center;
      line-height: 1.6;
    }

    button {
      -webkit-app-region: no-drag;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 28px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <span class="title">Gacha Tracker</span>
  <p class="message">Already running.<br>Check your taskbar to switch to it.</p>
  <button id="okBtn">OK</button>
  <script>
    document.getElementById('okBtn').addEventListener('click', () => window.close());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') window.close(); });
  </script>
</body>
</html>
